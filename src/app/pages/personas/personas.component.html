<h2>Agregar Persona</h2>

<form (ngSubmit)="addPersona()">
  <input 
    type="text" 
    placeholder="Nombre"
    [(ngModel)]="first_name"
    name="first_name"
    required>

  <input 
    type="text" 
    placeholder="Apellido"
    [(ngModel)]="last_name"
    name="last_name"
    required>

  <input 
    type="number" 
    placeholder="Edad"
    [(ngModel)]="age"
    name="age"
    required>

  <button type="submit">Agregar</button>
</form>

<hr>

<h2>Lista de Personas</h2>

<table border="1">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Edad</th>
      <th>Acción</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let persona of personas">
      <td>{{persona.first_name}}</td>
      <td>{{persona.last_name}}</td>
      <td>{{persona.age}}</td>
      <td>
        <button (click)="deletePersona(persona.id)">
          Eliminar
        </button>
      </td>
    </tr>
  </tbody>
</table>
